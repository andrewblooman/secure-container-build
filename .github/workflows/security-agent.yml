name: Security Engineer Agent

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

env:
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Build the container image
  # ──────────────────────────────────────────────
  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.build.outputs.image-ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        id: build
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          echo "image-ref=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Save image as artefact
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -o /tmp/container-image.tar

      - name: Upload image artefact
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: /tmp/container-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Stage 2: Snyk Code scan (SAST)
  # ──────────────────────────────────────────────
  snyk-code-scan:
    name: Snyk Code Scan (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk Code scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-code.sarif

      - name: Create clean SARIF if no findings
        # snyk code test only writes the file when issues are found;
        # create a valid empty SARIF so the artifact is always present.
        if: always() && hashFiles('snyk-code.sarif') == ''
        run: |
          cat > snyk-code.sarif <<'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": { "driver": { "name": "Snyk Code", "rules": [] } },
              "results": []
            }]
          }
          EOF

      - name: Upload Snyk Code SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk-code.sarif') != ''
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Upload scan results as artefact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-code-results
          path: snyk-code.sarif

  # ──────────────────────────────────────────────
  # Stage 3: Snyk Container scan
  # ──────────────────────────────────────────────
  snyk-container-scan:
    name: Snyk Container Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download container image
        uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Load container image
        run: docker load -i /tmp/container-image.tar

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Container scan
        run: snyk container test ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --file=Dockerfile --exclude-base-image-vulns --json-file-output=snyk-container.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload scan results as artefact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-container-results
          path: snyk-container.json

  # ──────────────────────────────────────────────
  # Stage 4: Security Engineer Agent - AI Review
  # Calls the reusable workflow defined in security-review.yml
  # ──────────────────────────────────────────────
  security-agent-review:
    needs:
      - snyk-code-scan
      - snyk-container-scan
    if: always()
    uses: ./.github/workflows/security-review.yml
    with:
      pr-number: ${{ github.event.pull_request.number }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      APP_ID:            ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY:   ${{ secrets.APP_PRIVATE_KEY }}
